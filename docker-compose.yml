version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: ladisquerie-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: ladisquerie
    networks:
      - ladisquerie-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ladisquerie-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/ladisquerie
      JWT_SECRET: ${JWT_SECRET:-your_secret_key_here}
      PORT: 5000
      OMDB_API_KEY: ${OMDB_API_KEY:-}
      NODE_ENV: development
    depends_on:
      - mongodb
    networks:
      - ladisquerie-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ladisquerie-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - ladisquerie-network

volumes:
  mongodb_data:

networks:
  ladisquerie-network:
    driver: bridge
